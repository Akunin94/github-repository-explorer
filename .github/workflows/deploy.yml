name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Least-privilege token: read the repo, write the Pages deployment.
permissions:
  contents: read
  pages: write
  id-token: write

# One deployment at a time; cancel superseded in-progress runs.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      # Type-check + unit tests gate the deploy; build emits the static site.
      - run: npm run test
      - run: npm run build

      # `enablement: true` turns Pages on via the API if it isn't already, so a
      # fresh repo doesn't fail with "Get Pages site failed: Not Found". You can
      # instead enable it once under Settings -> Pages -> Source: GitHub Actions.
      - uses: actions/configure-pages@v5
        with:
          enablement: true

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
